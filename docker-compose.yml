services:
  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs
    ports:
      - "9044:9000"
      - "9045:9001"
    environment:
      RUSTFS_ACCESS_KEY: radiouser
      RUSTFS_SECRET_KEY: radiopass123
    volumes:
      - rustfs_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"] 
      interval: 5s
      timeout: 5s
      retries: 5

  radio:
    build:
      context: ./backend
    container_name: radio-server
    depends_on:
      rustfs:
        condition: service_healthy
      # - postgres
    env_file:
      - ./backend/.env
    environment:
      - PORT=8080
      - S3_ENDPOINT_URL=rustfs:9000
      - S3_BUCKET_NAME=music
      - S3_ACCESS_KEY_ID=radiouser
      - S3_SECRET_ACCESS_KEY=radiopass123
      - S3_USE_SSL=false
    ports:
      - "8080:8080"

  web:
    build:
      context: ./frontend
      args:
        VITE_RADIO_URL: "http://radio.femboy.local:8080"
        VITE_RADIO_NAME: "Local Radio"
    container_name: radio-web
    depends_on:
      - radio
    environment:
      - ORIGIN=http://radio.femboy.local:3000
      - VITE_RADIO_URL=http://radio:8080
      - VITE_RADIO_NAME="Local Radio"
      - BODY_SIZE_LIMIT=50M
    ports:
      - "3000:3000"

volumes:
  rustfs_data: